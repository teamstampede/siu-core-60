<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIU Study">
<title>SIU — 60-Day Core Leadership</title>
<style>
:root{
  --navy:#1B2E5E;
  --navy-dark:#111E3F;
  --navy-mid:#243570;
  --gold:#D4AF37;
  --gold-lt:#F5E9A9;
  --gold-dk:#A8860A;
  --white:#FFFFFF;
  --bg:#F4F5F8;
  --border:#D8DCE8;
  --text:#1A1A2E;
  --muted:#5A6080;
  --success-bg:#D1FAE5;
  --success:#065F46;
  --danger-bg:#FEE2E2;
  --danger:#991B1B;
  --warn-bg:#FEF3C7;
  --warn:#92400E;
  --s1-bg:#EDE9FE;--s1-txt:#4C1D95;
  --s2-bg:#D1FAE5;--s2-txt:#065F46;
  --s3-bg:#FEF3C7;--s3-txt:#78350F;
  --s4-bg:#E0E7FF;--s4-txt:#1E3A8A;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* LOGIN */
#screen-login{background:var(--navy-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;min-height:100vh}
#screen-login.active{display:flex}
.login-logo{width:140px;height:140px;border-radius:50%;overflow:hidden;margin-bottom:1.25rem;border:3px solid var(--gold)}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{font-size:24px;font-weight:700;color:var(--white);text-align:center;letter-spacing:.5px}
.login-sub{font-size:13px;color:var(--gold);text-align:center;margin-bottom:.25rem;letter-spacing:1px;text-transform:uppercase}
.login-track{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:1.75rem}
.login-card{width:100%;max-width:360px;background:var(--white);border-radius:var(--radius);padding:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:2px solid var(--gold);border-color:transparent}
.enroll-code{display:none}
.enroll-toggle{font-size:13px;color:var(--navy);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:1rem;text-decoration:underline}
.btn-primary{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--navy);color:var(--gold);cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn-primary:active{opacity:.9}
.login-err{display:none;margin-top:.75rem;padding:.75rem;background:var(--danger-bg);color:var(--danger);border-radius:var(--radius-sm);font-size:13px;text-align:center}

/* APP HEADER */
#screen-app{background:var(--bg)}
.app-header{background:var(--navy-dark);padding:.875rem 1rem .75rem;position:sticky;top:0;z-index:100}
.app-header-top{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.hdr-logo{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0}
.hdr-logo img{width:100%;height:100%;object-fit:cover}
.hdr-titles{flex:1}
.hdr-titles h1{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.3px}
.hdr-titles p{font-size:11px;color:var(--gold);letter-spacing:.5px}
.user-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:99px;padding:4px 10px 4px 5px;flex-shrink:0}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--navy-dark)}
.user-name{font-size:11px;color:rgba(255,255,255,.85)}
.prog-bar-wrap{height:5px;background:rgba(255,255,255,.15);border-radius:99px}
.prog-bar-fill{height:100%;border-radius:99px;background:var(--gold);transition:width .4s ease}
.prog-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:.3rem}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--white);border-bottom:1px solid var(--border)}
.tab{padding:12px;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}

/* STAGE BAR */
.stage-bar{display:flex;gap:6px;overflow-x:auto;padding:.75rem 1rem;background:var(--white);border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.stage-bar::-webkit-scrollbar{display:none}
.stage-pill{flex-shrink:0;padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
.stage-pill.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:.75rem 1rem;background:var(--white);border-bottom:1px solid var(--border)}
.day-dot{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);gap:1px;min-height:44px;-webkit-user-select:none;user-select:none;transition:all .15s}
.day-dot span:first-child{font-size:9px;font-weight:400}
.day-dot.done{background:var(--success-bg);border-color:#5cb85c;color:#1a5c35}
.day-dot.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.day-dot:active{transform:scale(.95)}

/* STUDY CARD */
.study-content{padding:1rem}
.study-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.stage-badge{display:inline-block;padding:4px 12px;font-size:11px;font-weight:700;border-radius:99px;margin-bottom:.75rem;letter-spacing:.3px}
.s1{background:var(--s1-bg);color:var(--s1-txt)}
.s2{background:var(--s2-bg);color:var(--s2-txt)}
.s3{background:var(--s3-bg);color:var(--s3-txt)}
.s4{background:var(--s4-bg);color:var(--s4-txt)}
.day-num{font-size:12px;color:var(--muted);margin-bottom:.2rem}
.day-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:.75rem}
.ref-block{margin-bottom:1rem}
.ref-text{font-size:13px;color:var(--muted);margin-bottom:.5rem;display:block}
.bg-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#1a5276;border:1px solid #aed6f1;border-radius:var(--radius-sm);padding:10px 16px;text-decoration:none;background:#eaf4fb}
.devotional{font-size:15px;color:var(--muted);line-height:1.75;font-style:italic;border-left:3px solid var(--gold);padding-left:.875rem;margin-bottom:1.25rem}
.q-block{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.q-block:last-of-type{border-bottom:none;padding-bottom:0}
.q-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:.4rem}
.q-text{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:.6rem;font-weight:500}
textarea.ans-input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);resize:vertical;min-height:88px;font-family:inherit;line-height:1.5;-webkit-appearance:none}
textarea.ans-input:focus{outline:2px solid var(--navy);border-color:transparent;background:var(--white)}
textarea.ans-input[readonly]{background:#f0f0ed;color:var(--muted)}
.mc-list{display:flex;flex-direction:column;gap:8px}
.mc-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:15px;color:var(--text);background:var(--white);-webkit-user-select:none;user-select:none;min-height:50px;transition:all .15s}
.mc-item.sel{background:var(--success-bg);border-color:#5cb85c;color:#065f46;font-weight:500}
.mc-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mc-item.sel .mc-radio{background:#5cb85c;border-color:#5cb85c}
.mc-radio-dot{width:8px;height:8px;border-radius:50%;background:white;display:none}
.mc-item.sel .mc-radio-dot{display:block}
.submit-btn{width:100%;padding:15px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--navy);color:var(--gold);cursor:pointer;font-family:inherit;margin-top:1rem;letter-spacing:.5px}
.submit-btn:active{opacity:.9}
.submit-btn:disabled{opacity:.5}
.toast{padding:.875rem 1rem;border-radius:var(--radius-sm);font-size:14px;margin-top:.75rem;text-align:center;display:none;line-height:1.4}
.toast.ok{background:var(--success-bg);color:var(--success);display:block}
.toast.err{background:var(--danger-bg);color:var(--danger);display:block}
.toast.saving{background:var(--warn-bg);color:var(--warn);display:block}
.done-banner{padding:1rem;background:var(--success-bg);color:#065f46;border-radius:var(--radius-sm);font-size:14px;text-align:center;margin-top:.75rem;line-height:1.6;border:1px solid #a7f3d0}
.done-banner strong{display:block;font-size:15px;margin-bottom:.2rem}
.nav-row{display:flex;gap:8px;margin-top:1rem}
.nav-btn{flex:1;padding:13px;font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--text);cursor:pointer;font-family:inherit;text-align:center}

/* REPORT */
.report-content{padding:1rem}
.siu-banner{background:var(--navy-dark);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.siu-banner-logo{width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0}
.siu-banner-logo img{width:100%;height:100%;object-fit:cover}
.siu-banner-text strong{display:block;font-size:15px;color:var(--white);font-weight:700}
.siu-banner-text span{font-size:12px;color:var(--gold)}
.siu-banner-text a{display:inline-block;margin-top:.5rem;padding:7px 14px;background:var(--gold);color:var(--navy-dark);border-radius:var(--radius-sm);font-size:12px;font-weight:700;text-decoration:none}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.metric-val{font-size:28px;font-weight:700;color:var(--navy)}
.metric-lbl{font-size:12px;color:var(--muted);margin-top:2px}
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}
.stage-row{margin-bottom:.875rem}
.stage-row:last-child{margin-bottom:0}
.stage-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--text);margin-bottom:.35rem}
.stage-pct{color:var(--muted);font-size:12px}
.prog-track{height:7px;background:var(--border);border-radius:99px}
.prog-inner{height:100%;border-radius:99px;background:var(--navy);transition:width .5s ease}
.sub-item{padding:1rem 0;border-bottom:1px solid var(--border)}
.sub-item:last-child{border-bottom:none}
.sub-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.3rem}
.sub-name{font-size:15px;font-weight:700;color:var(--text)}
.sub-badge{font-size:11px;color:var(--success);background:var(--success-bg);padding:3px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.sub-day-info{font-size:13px;color:var(--navy);font-weight:600;margin-bottom:.2rem}
.sub-time{font-size:11px;color:var(--muted)}
.sub-preview{font-size:13px;color:var(--muted);margin:.5rem 0;line-height:1.5}
.expand-btn{font-size:13px;color:#1a5276;background:none;border:none;cursor:pointer;padding:3px 0;font-family:inherit}
.ans-detail{display:none;margin-top:.75rem;background:var(--bg);border-radius:var(--radius-sm);padding:.875rem;border:1px solid var(--border)}
.ans-q{margin-bottom:.75rem;font-size:13px;line-height:1.6}
.ans-q:last-child{margin-bottom:0}
.ans-q-label{font-weight:700;color:var(--text);display:block;margin-bottom:.2rem}
.ans-q-text{color:var(--muted)}
.conn-status{display:none;padding:.875rem 1rem;border-radius:10px;font-size:14px;margin-bottom:.75rem;text-align:center;line-height:1.5}
.test-btn{width:100%;padding:13px;font-size:14px;font-weight:500;border:1px solid #aed6f1;border-radius:10px;background:#eaf4fb;color:#1a5276;cursor:pointer;font-family:inherit;margin-bottom:.75rem}
.logout-btn{width:100%;padding:13px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:.5rem}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px;line-height:1.7}
</style>
</head>
