<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOmJ9XPFuCuoKC3y1QfMf91YkP__SIccLheK-0krGPiycnr5tgjcBlp3BGv2iJWJPtgQ/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Czc2AOsWVh2jHCxyuCRTuPqk-A32NVpec8u2l0kV4-s/edit';
const BG_BASE = 'https://www.biblegateway.com/passage/?search=';
const BG_VER = '&version=MSG';
const ADMIN_CODE = 'SIU2024';
const TRACK = 'Core Leadership';
const LEVEL = '60-Day';

const sName={1:'Deepening your foundation',2:'Character under pressure',3:'Leading yourself',4:'Covenant leadership in action'};
const sBadge={1:'s1',2:'s2',3:'s3',4:'s4'};

const DAYS=[
{day:1,stage:1,title:'The deeper call',ref:'Isaiah 40:28-31',dev:'The 30-day foundation was the runway. This is the takeoff. God isn\'t done revealing Himself to you — He is just getting started. Those who wait on the Lord shall renew their strength.',q:[
{t:'s',q:'What did the 30-day foundation reveal about yourself that surprised you most?'},
{t:'s',q:'Isaiah 40:31 promises renewed strength to those who wait. What does waiting on God look like practically in a busy leadership season?'},
{t:'m',q:'Isaiah 40:31 says those who wait on the Lord shall do which of the following?',o:['Sleep peacefully','Mount up with wings as eagles','Receive instant answers','Never face trials']},
{t:'s',q:'What area of your relationship with God do you most want to go deeper in over these 60 days?'},
{t:'s',q:'Write a personal expectation statement for this 60-day journey — what do you believe God will do in you?'}
]},
{day:2,stage:1,title:'Knowing God in suffering',ref:'Job 42:1-5',dev:'Job didn\'t get answers — he got encounter. After everything he lost, after all the arguments and silence, God showed up. And Job said: "I had heard about you, but now I have seen you." There is a version of God you can only meet in the fire.',q:[
{t:'s',q:'What is the difference between knowing about God and actually knowing God? Where are you on that spectrum?'},
{t:'m',q:'After his suffering, Job said "now my eye sees you." What does this suggest about the role of hardship in spiritual formation?',o:['Hardship is punishment','Hardship can deepen our revelation of God','God causes all suffering','We should avoid all suffering']},
{t:'s',q:'Describe a season of suffering that ultimately brought you closer to God. What did you learn about Him that you couldn\'t have learned any other way?'},
{t:'s',q:'How do you lead others through suffering when you are supposed to have answers?'},
{t:'s',q:'What are you currently walking through that is forming something in you God could not develop any other way?'}
]},
{day:3,stage:1,title:'The glory of God',ref:'Exodus 33:18-23',dev:'Moses had seen plagues, parted seas, fire from heaven, and manna in the desert. And still he asked: "Show me your glory." There is always more of God to know. The hunger itself is holy.',q:[
{t:'s',q:'Moses had already seen extraordinary miracles yet still hungered for more of God. What does that tell you about the nature of God\'s glory?'},
{t:'m',q:'God told Moses he could not see His face and live, so He hid Moses where?',o:['Behind a cloud','In a cave','In the cleft of the rock','Under the mountain']},
{t:'s',q:'What aspects of God\'s glory have you personally experienced? What aspects are you still hungry for?'},
{t:'s',q:'How does a leader\'s personal hunger for God affect the spiritual atmosphere they create around them?'},
{t:'s',q:'Write a "show me your glory" prayer — what specifically are you asking God to reveal to you in this season?'}
]},
{day:4,stage:1,title:'God\'s word as living power',ref:'Hebrews 4:12-13',dev:'The Word of God is not a religious text. It is a living, breathing, two-edged sword. It divides between what you think you are and what you actually are. It judges the thoughts and intentions of the heart — not your actions alone, but your motives.',q:[
{t:'s',q:'Hebrews 4:12 says the Word divides soul and spirit. What is the difference between soulish motivation and spirit-led motivation in leadership?'},
{t:'m',q:'According to Hebrews 4:12, the Word of God judges the thoughts and intentions of what?',o:['Our enemies','The heart','The body','The mind only']},
{t:'s',q:'Describe a time when scripture exposed something in you that you had been hiding from yourself. What happened?'},
{t:'s',q:'How has your relationship with the Bible changed from when you first came to faith to where you are now?'},
{t:'s',q:'What specific book or passage of scripture is God calling you to go deeper in right now and why?'}
]},
{day:5,stage:1,title:'The Holy Spirit as teacher',ref:'John 16:12-15',dev:'Jesus said there were things He could not yet tell His disciples — not because He was withholding, but because they could not bear it yet. The Holy Spirit reveals truth progressively, at the pace your character can sustain it.',q:[
{t:'s',q:'What does it mean that the Holy Spirit guides you into "all truth"? Is this instantaneous or progressive?'},
{t:'m',q:'Jesus said the Spirit of truth will guide you into all truth. The Spirit will speak what He hears and declare what?',o:['What you want to hear','Things to come','Your destiny','Other people\'s sins']},
{t:'s',q:'Describe a specific moment when the Holy Spirit taught you something directly — not through a sermon but through personal revelation.'},
{t:'s',q:'Are there truths you sense God is preparing to reveal to you that you may not be quite ready to receive? What makes you say that?'},
{t:'s',q:'How do you create space in your leadership life for the Holy Spirit to teach you — not just inform you?'}
]},
{day:6,stage:1,title:'Abiding not striving',ref:'John 15:1-8',dev:'Abide. Not strive. Not achieve. Not perform. Abide. The branch does not work to produce fruit — it stays connected to the vine and fruit is the natural result. The crisis in leadership is not effort — it is disconnection.',q:[
{t:'s',q:'What is the difference between striving in ministry and abiding in Christ? Which one characterizes your leadership right now?'},
{t:'m',q:'John 15:5 says apart from Christ you can do what?',o:['Do small things','Do nothing','Do some things','Do great things alone']},
{t:'s',q:'What does abiding actually look like on a Tuesday morning when you have meetings, problems and people pulling at you?'},
{t:'s',q:'Where in your ministry life is the fruit of disconnection showing up — stress, control, striving, dryness?'},
{t:'s',q:'What one practical change can you make this week to prioritize connection with Christ over activity for Christ?'}
]},
{day:7,stage:1,title:'Hearing God clearly',ref:'John 10:1-5',dev:'The sheep know the shepherd\'s voice. Not because they studied voice recognition — because they spent time with Him. Clarity in hearing God is not a gift for the spiritually elite. It is the natural outcome of proximity.',q:[
{t:'s',q:'On a scale of 1-10 how clearly do you currently hear God\'s voice? What is affecting that number?'},
{t:'m',q:'John 10:5 says the sheep will not follow a stranger but will flee from him because they do not know what?',o:['His name','His voice','His face','His intentions']},
{t:'s',q:'Describe the clearest moment you have ever heard God speak to you. What were the conditions that made it possible?'},
{t:'s',q:'What are the main things that create static between you and God\'s voice in your current season?'},
{t:'s',q:'How do you test what you believe you are hearing from God before acting on it in a leadership context?'}
]},
{day:8,stage:1,title:'The fear of the Lord — deeper',ref:'Proverbs 8:13',dev:'We covered the fear of the Lord in the foundation. But leadership takes it deeper. The fear of the Lord is not just reverence in worship — it is the standard by which every decision, every conversation, every moment of power is measured.',q:[
{t:'s',q:'How has your understanding of the fear of the Lord deepened since the 30-day foundation?'},
{t:'m',q:'Proverbs 8:13 says the fear of the Lord is to hate what?',o:['Your enemies','Evil — pride, arrogance, corrupt speech','Weakness','People who sin']},
{t:'s',q:'Pride and arrogance are listed as things God hates in this passage. Where do you see either of these trying to take root in your leadership?'},
{t:'s',q:'How does the fear of the Lord change the way you handle the moments when no one is watching?'},
{t:'s',q:'Name one leadership decision you made recently. How would you evaluate it through the lens of the fear of the Lord?'}
]},
{day:9,stage:1,title:'The sovereignty of God',ref:'Romans 8:28-30',dev:'All things work together for good. Not some things. Not the pleasant things. All things. This is not wishful thinking — it is theological bedrock. A leader who does not believe in God\'s sovereignty will be undone by the things they cannot control.',q:[
{t:'s',q:'What is the difference between God causing something and God working through something? Why does that distinction matter for a leader?'},
{t:'m',q:'Romans 8:28 says all things work together for good to those who love God and are called according to what?',o:['Their talent','Their obedience','His purpose','Their prayer life']},
{t:'s',q:'Describe a situation in your life or ministry that looked like a disaster at the time but God used for something good. What did it produce in you?'},
{t:'s',q:'What current situation in your ministry are you struggling to trust God\'s sovereignty over?'},
{t:'s',q:'How does a genuine belief in God\'s sovereignty change the way you lead in uncertainty?'}
]},
{day:10,stage:1,title:'Grace that empowers',ref:'2 Corinthians 12:9-10',dev:'My grace is sufficient. Paul heard that in the middle of a thorn he begged God three times to remove. God did not remove the thorn — He reframed it. Grace is not the absence of weakness. Grace is the power of God made perfect in weakness.',q:[
{t:'s',q:'Paul boasted in his weaknesses because of what they unlocked. What weakness in your leadership has God used as a platform for His strength?'},
{t:'m',q:'God told Paul "My grace is sufficient for you, for My power is made perfect in" what?',o:['Faith','Strength','Weakness','Prayer']},
{t:'s',q:'Is there a thorn in your life right now that you have been asking God to remove? What if God is saying "my grace is sufficient" instead?'},
{t:'s',q:'How do you lead with authenticity about your weaknesses without losing the confidence your team needs from you?'},
{t:'s',q:'Write a prayer surrendering one specific area of weakness to God and asking Him to make His power perfect in it.'}
]},
{day:11,stage:1,title:'Intercession as leadership',ref:'Ezekiel 22:30',dev:'God looked for someone to stand in the gap. That phrase — stand in the gap — is a military image. A gap in the wall is where the enemy enters. An intercessor is a leader who positions themselves between the enemy and the people they love.',q:[
{t:'s',q:'What does it mean to "stand in the gap" as a leader in your specific ministry context?'},
{t:'m',q:'In Ezekiel 22:30, God was looking for a man to stand in the gap before Him on behalf of the land so He would not have to do what?',o:['Leave','Send provision','Destroy it','Judge the leaders']},
{t:'s',q:'Who is currently standing in the gap for you in prayer? Who are you standing in the gap for?'},
{t:'s',q:'How does intercessory prayer change the way you see and lead the people in your care?'},
{t:'s',q:'Name three specific people or situations in SIM that you will commit to standing in the gap for over these 60 days. Write their names and your prayer for each.'}
]},
{day:12,stage:1,title:'The mind of Christ',ref:'1 Corinthians 2:14-16',dev:'We have the mind of Christ. Not occasionally. Not in special moments. As a permanent possession. But it must be accessed. The natural mind cannot receive the things of the Spirit — they are spiritually discerned. A leader who leads from the natural mind alone is operating at a fraction of their capacity.',q:[
{t:'s',q:'What does it practically mean to lead from the mind of Christ rather than from your own reasoning?'},
{t:'m',q:'1 Corinthians 2:14 says the natural person does not accept the things of the Spirit of God because they are what to him?',o:['Too simple','Foolishness','Too spiritual','Confusing']},
{t:'s',q:'Describe a leadership decision where you led from natural reasoning and it cost you. What would the mind of Christ have produced differently?'},
{t:'s',q:'How do you practically access the mind of Christ before making significant leadership decisions?'},
{t:'s',q:'What decisions are currently in front of you that you need to bring to the mind of Christ rather than process alone?'}
]},
{day:13,stage:1,title:'God\'s timing vs your timeline',ref:'Ecclesiastes 3:1-8',dev:'To everything there is a season. That is not a comfort quote — it is a leadership principle. Seasons are sovereign. You cannot rush a season any more than you can rush spring. But you can be so busy trying to force what isn\'t time yet that you miss what is time right now.',q:[
{t:'s',q:'Where in your leadership are you trying to force something into a season it has not yet been appointed to?'},
{t:'m',q:'Ecclesiastes 3 lists opposites for every human experience. What does this teach us about the nature of God\'s sovereign design?',o:['Life is random','Everything has an appointed time under God\'s authority','We control our own seasons','God is unpredictable']},
{t:'s',q:'Describe a time when you moved ahead of God\'s timing. What happened? What did it cost?'},
{t:'s',q:'How do you discern the difference between delayed obedience and waiting on God\'s timing?'},
{t:'s',q:'What is something God has clearly told you is coming — but has not yet released? How are you stewarding that waiting season?'}
]},
{day:14,stage:1,title:'Spiritual disciplines for leaders',ref:'Daniel 6:10',dev:'Daniel had a discipline before he had a lions\' den. His three-times-a-day prayer was not a crisis response — it was an established pattern. The disciplines you build in the ordinary season are the ones that carry you through the extraordinary one.',q:[
{t:'s',q:'What spiritual disciplines do you currently practice that are non-negotiable regardless of schedule?'},
{t:'m',q:'Daniel continued his practice of praying three times daily even after the decree was signed. What does this reveal about the relationship between spiritual discipline and external pressure?',o:['Discipline makes you stubborn','Established discipline holds under pressure','Prayer protects you from all problems','Leaders should avoid political conflict']},
{t:'s',q:'Which spiritual discipline is currently the weakest link in your leadership life and why?'},
{t:'s',q:'How do you protect your spiritual disciplines when leadership demands escalate and time compresses?'},
{t:'s',q:'Design your ideal weekly spiritual rhythm — prayer, Word, fasting, rest, accountability. Be specific about days and times.'}
]},
{day:15,stage:1,title:'The love of God as foundation',ref:'Ephesians 3:17-19',dev:'Paul prayed that you would know the love of Christ which surpasses knowledge. Not just believe it theoretically — know it experientially. A leader whose foundation is the love of God cannot be shaken by rejection, failure, or criticism. They already know who they are to the Father.',q:[
{t:'s',q:'Paul says knowing the love of Christ surpasses knowledge. What is the difference between intellectual knowledge of God\'s love and experiential knowledge of it?'},
{t:'m',q:'Ephesians 3:19 says that you might be filled with all the fullness of what?',o:['The Spirit','Knowledge','God','Love only']},
{t:'s',q:'How secure is your leadership in the love of God? What causes that security to waver?'},
{t:'s',q:'How does a leader who is rooted in God\'s love lead differently from one who is not?'},
{t:'s',q:'Write a declaration of who you are in the love of God — speak to your leadership identity, your value, and your purpose. Make it personal and bold.'}
]},
{day:16,stage:2,title:'Character is the real credential',ref:'1 Timothy 3:1-7',dev:'The qualifications Paul gives for leadership are almost entirely character qualifications — not gifting, not charisma, not results. Above reproach. Self-controlled. Respectable. Not a lover of money. The Church has suffered enormously from promoting gifting ahead of character.',q:[
{t:'s',q:'Looking at the qualifications in 1 Timothy 3, which ones are you strongest in? Which ones are still being developed?'},
{t:'m',q:'1 Timothy 3 says a leader must manage his own household well. What does Paul say is the implication if he cannot?',o:['He needs more training','How can he take care of God\'s church?','He should step down immediately','He needs counseling only']},
{t:'s',q:'Where have you witnessed gifting outpace character in leadership — in your own life or in others? What were the consequences?'},
{t:'s',q:'What character quality do you most need God to develop in you in this season of leadership?'},
{t:'s',q:'Who in your life is close enough to you to tell you the truth about your character? When did they last do so?'}
]},
{day:17,stage:2,title:'Integrity in private',ref:'Psalm 101:2-4',dev:'David said "I will walk with integrity of heart within my house." Within my house — not at the pulpit, not on the platform, not in public ministry. At home. In private. Where no one is watching. That is where character is actually formed.',q:[
{t:'s',q:'What does your private life look like compared to your public ministry? Is there a gap?'},
{t:'m',q:'Psalm 101:3 says David will not set before his eyes anything that is what?',o:['Too beautiful','Worthless','Too expensive','Other people\'s business']},
{t:'s',q:'What is one private habit or pattern that, if your congregation could see it, would concern them? What are you doing about it?'},
{t:'s',q:'How does private integrity directly affect your public authority in ministry?'},
{t:'s',q:'Identify one specific area of your private life where you want to raise the standard this week. Write what you will do differently.'}
]},
{day:18,stage:2,title:'Humility that doesn\'t quit',ref:'Philippians 2:3-8',dev:'Jesus, being God, took on flesh. Took on limitation. Took on rejection. Took on a cross. If humility was not beneath Him — it is not beneath you. The issue is not whether you can be humble in private. The test is whether you can be humble when you are right and no one acknowledges it.',q:[
{t:'s',q:'What is the difference between false humility and genuine humility? Which do you practice more?'},
{t:'m',q:'Philippians 2:3 says do nothing from selfish ambition or conceit but in humility count others as what?',o:['Equal to yourself','Needing your help','More significant than yourselves','Beneath your calling']},
{t:'s',q:'Describe a recent situation where humility was genuinely difficult for you. What made it hard?'},
{t:'s',q:'How does a leader stay humble as influence, recognition and authority grow?'},
{t:'s',q:'Who in your life consistently demonstrates genuine humility? What specific quality in them do you want to develop?'}
]},
{day:19,stage:2,title:'Anger and the leader',ref:'James 1:19-20',dev:'The wrath of man does not produce the righteousness of God. That is one of the most confronting statements in scripture for leaders. Because leadership is full of moments that provoke anger — injustice, betrayal, incompetence, opposition. The question is never whether you feel it. The question is what you do with it.',q:[
{t:'s',q:'What situations in ministry most consistently provoke anger in you? What does that reveal?'},
{t:'m',q:'James 1:19 gives three instructions. Which of the following is NOT one of them?',o:['Quick to listen','Slow to speak','Quick to anger','Slow to anger']},
{t:'s',q:'Describe a time when your anger as a leader did damage — to a relationship, a team, or a situation. What would you do differently?'},
{t:'s',q:'What is the difference between righteous anger and unrighteous anger in leadership? How do you tell them apart?'},
{t:'s',q:'What is your current strategy for processing anger before it processes you? Be honest if you don\'t have one yet.'}
]},
{day:20,stage:2,title:'The test of offense',ref:'Matthew 18:15-17',dev:'Jesus gave a very specific process for dealing with offense — go directly to the person. Not to someone else about the person. Not to your journal only. Not into silent resentment. Directly to them. Offense is inevitable in leadership. Staying offended is a choice.',q:[
{t:'s',q:'Are you currently carrying an offense against anyone in ministry? Name it honestly in your response.'},
{t:'m',q:'Matthew 18:15 says if your brother sins against you, what should you do first?',o:['Tell the pastor','Go to them privately and point out the fault','Pray for them and wait','Forgive them silently and never bring it up']},
{t:'s',q:'Why is it so tempting to talk to others about an offense rather than going directly to the person involved?'},
{t:'s',q:'How has unresolved offense affected your leadership in the past — your joy, your effectiveness, your relationships?'},
{t:'s',q:'Who do you need to go to this week and have a direct, honest conversation with? What will you say?'}
]},
{day:21,stage:2,title:'Faithfulness under invisibility',ref:'Luke 16:10-12',dev:'Whoever can be trusted with very little can also be trusted with much. The invisible assignments are not the waiting room before real ministry begins. They are the curriculum. What you do when no one is watching determines what God can release when everyone is watching.',q:[
{t:'s',q:'What is the most invisible assignment you are currently carrying? How are you doing in it?'},
{t:'m',q:'Luke 16:11 says if you have not been faithful with worldly wealth, who will trust you with true riches?',o:['The congregation','No one','God and man','Only God']},
{t:'s',q:'Where has God promoted you recently because of faithfulness in something small? What did that season look like?'},
{t:'s',q:'What invisible assignment are you most tempted to minimize or neglect because no one seems to notice?'},
{t:'s',q:'Write a commitment to your current invisible assignments — what you will do faithfully this week regardless of who sees it.'}
]},
{day:22,stage:2,title:'Guarding your mouth',ref:'Proverbs 18:21',dev:'Death and life are in the power of the tongue. A leader\'s words are not just communication — they are creation. You are constantly shaping the reality of the people around you with what you say and how you say it. The tongue of a leader is one of their most powerful and most dangerous tools.',q:[
{t:'s',q:'What have you created — positively or negatively — in someone\'s life recently through the words you spoke to them?'},
{t:'m',q:'Proverbs 18:21 says death and life are in the power of the tongue. Those who love it will eat what?',o:['Its blessings','Its fruits','Its rewards','Its power']},
{t:'s',q:'What patterns in your speech do you need to bring under greater discipline — complaining, negativity, sarcasm, harshness?'},
{t:'s',q:'How intentional are you about speaking life over the people you lead? Give a specific recent example.'},
{t:'s',q:'Identify one person in your sphere this week who needs you to speak specific life and truth over them. What will you say?'}
]},
{day:23,stage:2,title:'Purity of motive',ref:'Matthew 6:1-4',dev:'Be careful not to do your acts of righteousness in front of others to be seen by them. Jesus didn\'t say don\'t do righteous acts — He said watch your motive for doing them. The same action — giving, serving, leading — can come from two entirely different hearts.',q:[
{t:'s',q:'How do you honestly evaluate your motives in ministry? What process do you use?'},
{t:'m',q:'Matthew 6:1 warns against doing acts of righteousness before others in order to what?',o:['Teach them','Be seen by them','Gain authority','Set an example']},
{t:'s',q:'Describe a ministry action you took recently. If you are completely honest, what percentage was for God and what percentage was for recognition?'},
{t:'s',q:'What is the danger of impure motives that goes unaddressed over years of ministry?'},
{t:'s',q:'What would change in your ministry activity if you knew with certainty that no one — not your pastor, not your peers, not your congregation — would ever know what you did?'}
]},
{day:24,stage:2,title:'Endurance as a spiritual gift',ref:'James 1:2-4',dev:'Count it all joy when you encounter trials. Not if — when. Trials are not an interruption to the leadership journey. They are the instrument of it. The testing of your faith produces endurance. And endurance has a finished work — it produces maturity, completeness, lacking nothing.',q:[
{t:'s',q:'What is the difference between mere survival of a trial and actually counting it joy? Have you ever done the latter?'},
{t:'m',q:'James 1:4 says let endurance have its perfect result so that you may be what?',o:['Promoted','Perfect and complete, lacking nothing','Stronger than others','Free from future trials']},
{t:'s',q:'What trial are you currently enduring? What is it producing in you?'},
{t:'s',q:'How do you lead others through trials while you yourself are in the middle of one?'},
{t:'s',q:'Name a leader you respect who has endured something that shaped them into who they are today. What specifically did the endurance produce?'}
]},
{day:25,stage:2,title:'The weight of influence',ref:'Luke 12:48',dev:'To whom much is given much is required. This is not a motivational statement — it is a sobering one. Influence is not a trophy. It is a responsibility with a direct correlation to accountability. The greater your platform the greater your obligation to steward it with holiness.',q:[
{t:'s',q:'How do you currently think about the weight of your influence in SIM and in the lives of those you lead?'},
{t:'m',q:'Luke 12:48 says that from everyone who has been given much, much will be what?',o:['Expected','Demanded','Required','Taken']},
{t:'s',q:'Where are you potentially underestimating the impact your words, decisions and example have on others?'},
{t:'s',q:'How does the accountability that comes with influence motivate you to pursue holiness in private?'},
{t:'s',q:'Write an honest assessment of how you are currently stewarding your influence — what you are doing well and where you need to grow.'}
]},
{day:26,stage:2,title:'Rest as obedience',ref:'Exodus 20:8-11',dev:'God rested on the seventh day — not because He was tired, but because rest is holy. He built rest into the commandments. Rest is not a reward for finishing — it is a rhythm He designed into creation. A leader who cannot rest is a leader who does not fully trust God to hold things while they sleep.',q:[
{t:'s',q:'When did you last genuinely rest — not vacation, not sleep, but Sabbath rest where you stopped producing and simply received?'},
{t:'m',q:'Exodus 20:10 says the Sabbath is for you, your household, your workers, and also what?',o:['Your enemies','Your livestock and animals','Your neighbors','Your congregation']},
{t:'s',q:'What is your relationship with rest honestly? Do you wear busyness as a badge? Why?'},
{t:'s',q:'What does rest reveal about your theology — specifically what you believe about God\'s sovereignty when you stop working?'},
{t:'s',q:'Design a Sabbath practice for yourself. What will it include, what will it exclude, and what day will it be?'}
]},
{day:27,stage:2,title:'Leading through disappointment',ref:'Habakkuk 3:17-19',dev:'Even if the fig tree does not blossom. Even if there is no fruit on the vine. Even if the fields produce nothing. Yet I will rejoice. Yet is one of the most powerful words in scripture. It is the language of a leader who has decided their joy is not contingent on outcomes.',q:[
{t:'s',q:'What is the "yet" in your leadership right now — the thing you have not yet seen that you are still choosing to praise God through?'},
{t:'m',q:'Habakkuk 3:19 says the Lord God is his strength and makes his feet like what?',o:['Rushing waters','The feet of a deer','Iron boots','The wings of eagles']},
{t:'s',q:'Describe a season of leadership disappointment. How did you handle it? What did it reveal about where your joy was anchored?'},
{t:'s',q:'How do you model "yet praise" for your team when circumstances are not going well?'},
{t:'s',q:'Write a "yet" declaration — name what has not come through or what has disappointed you, then declare your praise and trust in God anyway.'}
]},
{day:28,stage:2,title:'The power of consistency',ref:'Galatians 6:9',dev:'Do not grow weary in doing good, for at the proper time we will reap a harvest if we do not give up. The harvest is not the reward for the dramatic moment — it is the reward for not quitting on the ordinary days. Most leaders give up just before the breakthrough.',q:[
{t:'s',q:'Where are you most tempted to give up right now in your leadership?'},
{t:'m',q:'Galatians 6:9 promises a harvest at the proper time to those who do not do what?',o:['Doubt','Give up','Sin','Complain']},
{t:'s',q:'Name something in your ministry that requires sustained, unglamorous consistency right now. How are you doing?'},
{t:'s',q:'What does it look like to be consistent in character — not just consistent in activity?'},
{t:'s',q:'Think of someone who has been consistent in your life — in prayer for you, in encouragement, in faithfulness. Write them a note of gratitude in your response and then actually send it to them.'}
]},
{day:29,stage:2,title:'Generosity as a leadership posture',ref:'2 Corinthians 9:6-8',dev:'God loves a cheerful giver. Not a reluctant one. Not a calculating one. Cheerful. Generosity is not a financial principle alone — it is a leadership posture. Generous leaders give their time, their wisdom, their credit, their attention, their faith. Scarcity thinking in a leader contaminates an entire team.',q:[
{t:'s',q:'How generous are you as a leader — not just with money but with credit, time, attention and wisdom?'},
{t:'m',q:'2 Corinthians 9:6 says whoever sows sparingly will also reap sparingly, and whoever sows bountifully will also reap what?',o:['More than they need','Bountifully','Abundantly','Everything they desire']},
{t:'s',q:'Where has scarcity thinking shown up in your leadership? What did it cost you and your team?'},
{t:'s',q:'How does a leader model generosity in a way that shapes the culture of an entire ministry team?'},
{t:'s',q:'Identify one specific act of generosity you will carry out this week — beyond money. What will it be and who will it be toward?'}
]},
{day:30,stage:2,title:'Midpoint reflection',ref:'Lamentations 3:40',dev:'Let us examine our ways and test them, and let us return to the Lord. Every great journey requires a midpoint assessment. Not to condemn — to correct. Not to look back with regret but to look forward with clarity.',q:[
{t:'s',q:'You are halfway through this 60-day journey. What has been the most significant thing God has revealed to you so far?'},
{t:'m',q:'Lamentations 3:40 calls us to examine our ways and do what?',o:['Rest','Return to the Lord','Tell others','Write it down']},
{t:'s',q:'Which day\'s content hit you hardest in Stage 1 or Stage 2? Why?'},
{t:'s',q:'What has changed in your leadership behavior or mindset in the last 30 days?'},
{t:'s',q:'Write a midpoint prayer — what you are asking God to do in the remaining 30 days of this program.'}
]},
{day:31,stage:3,title:'Self-leadership first',ref:'1 Corinthians 9:26-27',dev:'I discipline my body and keep it under control. Paul wrote that. The apostle who wrote half the New Testament, who planted churches across the Roman Empire, who had visions of the third heaven — still had to discipline his body daily. No one graduates from self-leadership.',q:[
{t:'s',q:'What areas of your personal life are currently undisciplined that are affecting your leadership capacity?'},
{t:'m',q:'Paul says he disciplines his body so he will not be what after preaching to others?',o:['Disqualified','Tired','Distracted','Wrong']},
{t:'s',q:'How do your physical habits — sleep, food, exercise, rest — directly impact your spiritual and leadership capacity?'},
{t:'s',q:'What does it mean to lead yourself well? Give three specific examples of what that looks like in your daily life.'},
{t:'s',q:'Build a 30-day personal leadership plan for yourself — one goal each in spiritual, physical, relational and leadership development. Be specific.'}
]},
{day:32,stage:3,title:'Managing your emotions',ref:'Proverbs 25:28',dev:'A person without self-control is like a city with broken-down walls. In ancient times a city without walls was completely vulnerable — every enemy had open access. Unmanaged emotions in a leader are broken walls. They do not just affect you — they leave everyone around you exposed.',q:[
{t:'s',q:'What emotions do you struggle most to manage in a leadership context and why?'},
{t:'m',q:'Proverbs 25:28 compares a man without self-control to what?',o:['A ship without a rudder','A city broken into and left without walls','A river without banks','A fire without containment']},
{t:'s',q:'Describe a specific moment when unmanaged emotion cost you something in leadership. What happened?'},
{t:'s',q:'What is your current strategy for emotional regulation before high-stakes leadership moments?'},
{t:'s',q:'Who on your team is most affected when your emotions are unmanaged? Write an honest assessment of the impact you have on them.'}
]},
{day:33,stage:3,title:'Knowing your assignment',ref:'Acts 20:24',dev:'Paul said "I consider my life worth nothing to me; my only aim is to finish the race and complete the task the Lord Jesus has given me." He knew his task. He was not doing ministry in general — he was completing a specific assignment. Clarity of assignment is one of the rarest and most powerful things a leader can possess.',q:[
{t:'s',q:'In one clear sentence, what is your specific assignment from God in this season?'},
{t:'m',q:'Acts 20:24 says Paul\'s aim was to finish the race and complete the task of doing what?',o:['Building churches','Testifying to the good news of God\'s grace','Training leaders','Writing scripture']},
{t:'s',q:'How clearly do you know the boundaries of your assignment — what you are called to do and what you are not?'},
{t:'s',q:'What are you currently doing in ministry that may be outside your assignment? What is the cost of that?'},
{t:'s',q:'How does clarity of assignment protect a leader from burnout, comparison and distraction?'}
]},
{day:34,stage:3,title:'Managing your time',ref:'Ephesians 5:15-16',dev:'Make the most of every opportunity because the days are evil. Paul wrote that to a church in a city full of distraction, immorality and competition for attention. Sound familiar? Time is the one resource that cannot be recovered. A leader who cannot steward time cannot steward much else.',q:[
{t:'s',q:'Honestly assess how you currently spend your time. What percentage goes to what matters most?'},
{t:'m',q:'Ephesians 5:15 says be very careful how you live — not as unwise but as what?',o:['Productive','Wise','Busy','Scheduled']},
{t:'s',q:'What time thieves are currently stealing the most from your leadership effectiveness?'},
{t:'s',q:'How do you protect time for the highest-priority work when everyone wants access to you?'},
{t:'s',q:'Design your ideal week — block by block. Then compare it to your actual last week. What is the gap and what will you do about it?'}
]},
{day:35,stage:3,title:'The inner life of a leader',ref:'Proverbs 4:23',dev:'Above all else guard your heart, for everything you do flows from it. Everything. Not some things. Not your ministry activities. Everything flows from the condition of the heart. The inner life is the source. If the source is polluted everything downstream is affected.',q:[
{t:'s',q:'What is the current condition of your heart? Not your ministry — your heart. Be honest.'},
{t:'m',q:'Proverbs 4:23 says to guard your heart above all else because from it flows what?',o:['Your ministry','The springs of life','Your words','Your decisions']},
{t:'s',q:'What is currently threatening the health of your inner life — bitterness, anxiety, pride, disappointment, comparison?'},
{t:'s',q:'What does guarding your heart look like practically in your day-to-day routine as a leader?'},
{t:'s',q:'If the people you lead could see the full condition of your inner life right now, what would they find? What needs attention?'}
]},
{day:36,stage:3,title:'Learning from failure',ref:'Proverbs 24:16',dev:'A righteous man falls seven times and rises again. The defining thing is not the falling — it is the rising. Every leader fails. The question is not whether you will stumble but what you do when you do. Leaders who cannot process failure with grace will either quit or cover up.',q:[
{t:'s',q:'What is your honest relationship with failure? Do you hide it, broadcast it, or process it well?'},
{t:'m',q:'Proverbs 24:16 contrasts the righteous who fall and rise with the wicked who do what?',o:['Fall and stay down','Never fall','Fail others','Stumble in prosperity']},
{t:'s',q:'Describe your most significant leadership failure. What did it teach you that success never could have?'},
{t:'s',q:'How do you lead a team through a collective failure without losing their confidence or yours?'},
{t:'s',q:'What failure from your past are you still carrying shame about that you need to release to God? Write a prayer of release.'}
]},
{day:37,stage:3,title:'Handling success',ref:'Deuteronomy 8:11-14',dev:'Be careful that you do not forget the Lord your God when you have built fine houses and your herds have grown and your silver and gold have increased. Success is often more dangerous to a leader than failure. Failure sends you to your knees. Success can make you forget why you were on your knees in the first place.',q:[
{t:'s',q:'Where has God given you notable success in ministry? How have you handled it spiritually?'},
{t:'m',q:'Deuteronomy 8:14 warns that when your heart becomes proud you might forget what?',o:['Your calling','The Lord your God who brought you out of Egypt','Your humble beginnings','The people who helped you']},
{t:'s',q:'What specific safeguards do you have in place to protect your humility as your influence grows?'},
{t:'s',q:'Has any success in your ministry created a distance from God rather than a deeper dependence? How?'},
{t:'s',q:'Write an Ebenezer prayer — a prayer of remembrance where you list specific things God has done and commit to never forgetting His role in every success you carry.'}
]},
{day:38,stage:3,title:'Boundaries that protect',ref:'Matthew 14:22-23',dev:'Jesus dismissed the crowd, sent the disciples away, and went up the mountain alone to pray. Alone. The Son of God maintained solitude boundaries in the middle of the most impactful ministry season the world had ever seen. If He needed it — you need it.',q:[
{t:'s',q:'What healthy boundaries do you currently have in your leadership life? Be specific.'},
{t:'m',q:'After feeding five thousand people, what did Jesus do immediately?',o:['He taught more','He went to the disciples\' boat','He dismissed the crowds and went alone to pray','He healed the sick who remained']},
{t:'s',q:'Where do you most struggle to maintain healthy boundaries — with people, with time, with work, with technology?'},
{t:'s',q:'What is the cost to you and your ministry when you do not maintain boundaries?'},
{t:'s',q:'Write three non-negotiable personal boundaries you are committing to for the rest of this 60-day program. Be specific about what they are and what they protect.'}
]},
{day:39,stage:3,title:'Processing criticism well',ref:'Proverbs 12:1',dev:'Whoever loves discipline loves knowledge, but whoever hates correction is stupid. Scripture does not soften that. A leader who cannot receive correction is walking toward destruction with the lights on. The question is not whether criticism will come — it is whether you can metabolize it into growth.',q:[
{t:'s',q:'What is your gut reaction when you receive criticism? Walk through your internal process honestly.'},
{t:'m',q:'Proverbs 12:1 says whoever hates reproof is what?',o:['Proud','Unwise','Stupid','Foolish']},
{t:'s',q:'What is the most valuable piece of criticism you have ever received in leadership? What made it valuable?'},
{t:'s',q:'How do you tell the difference between constructive criticism that deserves a hearing and destructive criticism that must be discerned and set aside?'},
{t:'s',q:'Who has earned the right to criticize your leadership and you will actually listen? Name them. When did you last invite their honest input?'}
]},
{day:40,stage:3,title:'Vision and how to carry it',ref:'Habakkuk 2:2-3',dev:'Write the vision and make it plain so that whoever reads it may run with it. Vision is not a feeling — it is a responsibility. If God gives you a vision and you cannot articulate it clearly enough for someone else to run with it, it will die in your head.',q:[
{t:'s',q:'Write out the vision God has given you for your specific role in SIM. Be as clear and specific as possible.'},
{t:'m',q:'Habakkuk 2:3 says the vision awaits its appointed time. If it seems slow what should you do?',o:['Abandon it','Revise it','Wait for it — it will surely come','Work harder']},
{t:'s',q:'How well can the people around you articulate your vision? What does their ability to do so tell you?'},
{t:'s',q:'What is the difference between a God-given vision and a personal ambition dressed in spiritual language?'},
{t:'s',q:'What are the three greatest threats to the vision God has given you right now? What are you doing about each?'}
]},
{day:41,stage:3,title:'Navigating transition',ref:'Joshua 3:3-4',dev:'You have not passed this way before. God said that to Israel right before they crossed the Jordan. Leadership transitions — new assignments, new seasons, new levels — always include territory you have never navigated. That is not a problem. That is a design feature.',q:[
{t:'s',q:'What transition are you currently navigating in your leadership or personal life?'},
{t:'m',q:'Joshua 3:4 told the people to follow the ark and leave a space between themselves and it. Why? Because they had not passed this way before. What is the spiritual principle here?',o:['God must lead in unfamiliar territory','Leaders should always keep distance from God\'s presence','New territory requires new people','Transitions should be avoided']},
{t:'s',q:'What has been the most challenging leadership transition of your life so far? What did it produce in you?'},
{t:'s',q:'What do you need to let go of from the previous season in order to fully embrace the current one?'},
{t:'s',q:'What is God asking you to step into right now that feels like territory you have not passed before? How are you responding?'}
]},
{day:42,stage:3,title:'Spiritual authority',ref:'Luke 10:17-20',dev:'The disciples came back excited because demons submitted to them in Jesus\' name. Jesus redirected their joy: don\'t rejoice that the spirits submit — rejoice that your names are written in heaven. Authority in the Kingdom is rooted in relationship, not in power. Operate in the wrong order and you will become dangerous.',q:[
{t:'s',q:'What is the source of your spiritual authority in ministry? Be theological and personal.'},
{t:'m',q:'Jesus told the disciples not to rejoice in the fact that spirits submitted to them but to rejoice in what?',o:['Their growing ministry','The fact that their names are written in heaven','The miracles they performed','Their obedience']},
{t:'s',q:'Have you ever operated in spiritual authority that outpaced your spiritual maturity? What happened?'},
{t:'s',q:'How does a leader build genuine spiritual authority rather than manufacturing the appearance of it?'},
{t:'s',q:'What is the relationship between submission and authority in your leadership life? Who are you submitted to?'}
]},
{day:43,stage:3,title:'When God is silent',ref:'Psalm 22:1-2',dev:'My God, my God, why have you forsaken me? David wrote that. Jesus quoted it from the cross. Even the greatest leaders — even the Son of God — walk through seasons of God\'s apparent silence. The silence is not abandonment. It is a different kind of training.',q:[
{t:'s',q:'Describe a season when God seemed silent to you. How long did it last? What did you do?'},
{t:'m',q:'In Psalm 22:2, David says he cries out day and night but what does not come?',o:['Peace','Rest','An answer','A helper']},
{t:'s',q:'What does a leader do with unanswered prayer in a way that does not destroy their faith or their team\'s faith?'},
{t:'s',q:'Looking back at a season of God\'s silence, what was He actually doing in you during that time that you could not see then?'},
{t:'s',q:'How do you model faith in God\'s silence for the people you lead without pretending the silence does not hurt?'}
]},
{day:44,stage:3,title:'Building others',ref:'Ephesians 4:11-13',dev:'God gave apostles, prophets, evangelists, pastors and teachers for one primary purpose: to equip the saints for the work of ministry. The job of the leader is not to do all the ministry — it is to build people who can. A leader who cannot build others has a ceiling on their impact equal to their own capacity.',q:[
{t:'s',q:'Who are you currently investing in to develop as a leader? Be specific — name them.'},
{t:'m',q:'According to Ephesians 4:12, the five-fold ministry gifts are given to equip the saints for what?',o:['Attending services','The work of ministry','Supporting the pastor','Church membership']},
{t:'s',q:'What is the difference between using people for ministry and actually building people through ministry?'},
{t:'s',q:'What is your current intentional plan for developing the next generation of leaders in SIM?'},
{t:'s',q:'Who invested in you and developed you as a leader? What specific thing did they do that made the greatest difference? How can you replicate that for someone else?'}
]},
{day:45,stage:3,title:'The art of delegation',ref:'Exodus 18:17-23',dev:'Moses was doing it all himself. Jethro watched him judge the people from morning to evening and said: "What you are doing is not good. You will wear yourself out — and the people too." Even Moses needed someone to tell him he was not called to do everything. Delegation is not weakness. It is wisdom.',q:[
{t:'s',q:'What are you currently doing that you should be delegating? Why are you holding onto it?'},
{t:'m',q:'Jethro told Moses to select capable men and have them serve as leaders over thousands, hundreds, fifties and tens. What would this accomplish?',o:['Give Moses more power','Make the load lighter so Moses could stand it','Build a larger organization','Satisfy the people\'s complaints']},
{t:'s',q:'What is the root of your struggle to delegate — control, perfectionism, lack of trust, lack of trained people?'},
{t:'s',q:'What would you be freed to do at a higher level if you successfully delegated three things you are currently carrying?'},
{t:'s',q:'Name three things you will delegate in the next 30 days. Name who you will delegate each to and what support you will give them.'}
]},
{day:46,stage:4,title:'Covenant leadership defined',ref:'2 Samuel 9:1-7',dev:'David asked "Is there anyone still left of the house of Saul to whom I can show kindness for Jonathan\'s sake?" Most leaders wait for people to earn their loyalty. David went looking for someone to bless because of a covenant he made with someone who was already dead. That is covenant leadership — it outlives the moment.',q:[
{t:'s',q:'How do you define covenant leadership in your own words? How is it different from contractual leadership?'},
{t:'m',q:'David showed kindness to Mephibosheth for whose sake?',o:['His own reputation','Saul\'s legacy','Jonathan\'s sake','God\'s law']},
{t:'s',q:'Who in your leadership sphere are you in covenant with — people you would show up for regardless of what they can do for you?'},
{t:'s',q:'Have you ever experienced someone leading you with covenant loyalty? What did it feel like? How did it shape you?'},
{t:'s',q:'What would it look like for you to lead every person on your team with covenant commitment rather than performance-based loyalty?'}
]},
{day:47,stage:4,title:'Protecting the culture',ref:'1 Corinthians 5:6-7',dev:'A little yeast works through the whole batch of dough. Culture is caught before it is taught. One undisciplined voice, one tolerated dishonesty, one unaddressed division — given time it will leach through an entire ministry. A covenant leader protects culture fiercely because they understand what is at stake.',q:[
{t:'s',q:'How would you describe the current culture of your ministry team? Is it the culture you want?'},
{t:'m',q:'1 Corinthians 5:6 says "Do you not know that a little yeast does what to the whole batch of dough?"',o:['Improves it','Leavens it','Destroys it','Purifies it']},
{t:'s',q:'What is the one cultural element in your team that most needs to be addressed right now?'},
{t:'s',q:'How do you address a cultural problem without destroying the people who are the carriers of it?'},
{t:'s',q:'Write three non-negotiable cultural values for your team — things that are true of you regardless of season, size, or success.'}
]},
{day:48,stage:4,title:'Navigating conflict as a leader',ref:'Romans 12:18',dev:'If it is possible, as far as it depends on you, live at peace with everyone. Paul built two qualifiers into that statement: "if possible" and "as far as it depends on you." He was not naive. Some conflict cannot be avoided. But everything within your power and your posture must lean toward peace.',q:[
{t:'s',q:'What is your default response to conflict in a ministry context — avoid, confront, escalate, withdraw?'},
{t:'m',q:'Romans 12:18 says "if it is possible, as far as it depends on you, live at peace with" whom?',o:['Your leadership team','Believers only','Everyone','Those who agree with you']},
{t:'s',q:'Describe a conflict in ministry that you handled well. What made the difference?'},
{t:'s',q:'Describe a conflict in ministry that you handled poorly. What should you have done differently?'},
{t:'s',q:'Is there an unresolved conflict in your current ministry context that you have been avoiding? Name it and write the first step you will take to address it.'}
]},
{day:49,stage:4,title:'The leader and money',ref:'1 Timothy 6:6-10',dev:'Godliness with contentment is great gain. Paul did not say money is the root of all evil — he said the love of money is the root of all kinds of evil. The issue is never the resource. The issue is what the resource does to your heart. A leader whose soul is untethered from money is a leader who can be trusted with it.',q:[
{t:'s',q:'What is your honest relationship with money — do you trust God in financial scarcity? In financial abundance?'},
{t:'m',q:'1 Timothy 6:10 says the love of money is the root of all kinds of evil. Some who have craved it have wandered from the faith and pierced themselves with what?',o:['Debt','Many griefs','Temptation','Loss of ministry']},
{t:'s',q:'Where has money — either the lack of it or the love of it — most tested your integrity as a leader?'},
{t:'s',q:'How do you model financial integrity and generosity to those you lead?'},
{t:'s',q:'Write an honest financial integrity statement — what you believe about money, how you handle it, and what safeguards you have in place.'}
]},
{day:50,stage:4,title:'Succession and legacy',ref:'2 Kings 2:9-10',dev:'Elisha asked for a double portion of Elijah\'s spirit. Elijah said: "You have asked a hard thing." But he gave Elisha a path to receive it — stay close, keep watching. Every great leader\'s final assignment is to leave someone better equipped than they were. Legacy is not what you build. It is who you build.',q:[
{t:'s',q:'Who are you currently pouring into who could carry the mantle of what God has placed on your life?'},
{t:'m',q:'Elijah told Elisha his request was granted only if he saw what happen?',o:['A chariot of fire appeared','Elijah was taken from him','He stayed faithful','God confirmed it with thunder']},
{t:'s',q:'What would it mean for your ministry to outlive you — not the organization but the spirit of it?'},
{t:'s',q:'What are you doing right now to ensure that what God has built through you does not collapse when you transition out of your current role?'},
{t:'s',q:'Write a legacy statement — not what you want to accomplish but who you want to have shaped by the time your current assignment is complete.'}
]},
{day:51,stage:4,title:'The power of example',ref:'1 Corinthians 11:1',dev:'Follow my example as I follow the example of Christ. That is one of the boldest statements in scripture. Paul did not say follow my teaching — he said follow my example. A leader who is not willing to be followed as an example is a leader who does not fully believe what they teach.',q:[
{t:'s',q:'Are you currently living in a way that you would be comfortable saying to your team: "follow my example"? Why or why not?'},
{t:'m',q:'Paul says "follow my example as I follow the example of" whom?',o:['The apostles','The scriptures','Christ','The elders']},
{t:'s',q:'What specific aspects of your life and leadership are genuinely worth imitating right now?'},
{t:'s',q:'What aspects of your life would you NOT want your team to imitate? What are you doing about those?'},
{t:'s',q:'Write a list of the five most important things you want the people who follow your leadership to catch from your example — not your words, your actual life.'}
]},
{day:52,stage:4,title:'Leading in spiritual warfare',ref:'Ephesians 6:10-13',dev:'Our struggle is not against flesh and blood. A leader who does not understand this will spend their entire ministry fighting the wrong enemies — blaming people for what principalities are doing, addressing symptoms while the root goes untouched. Spiritual warfare literacy is not optional for a covenant leader.',q:[
{t:'s',q:'How spiritually warfare-literate are you? How does your understanding of it shape your leadership decisions?'},
{t:'m',q:'Ephesians 6:12 says our struggle is against rulers, authorities, powers of the dark world and what?',o:['Sinful people','Spiritual forces of evil in the heavenly realms','Temptation only','False teachers']},
{t:'s',q:'What spiritual opposition are you currently aware of in your ministry? How are you engaging it?'},
{t:'s',q:'How do you distinguish between a spiritual warfare battle and a natural leadership challenge that just needs better management?'},
{t:'s',q:'What is your current personal warfare strategy — how do you fight, how do you stand, how do you protect the people in your care?'}
]},
{day:53,stage:4,title:'Unity as a weapon',ref:'Psalm 133:1-3',dev:'Behold how good and pleasant it is when brothers dwell in unity. David called it pleasant — but it is also powerful. Where unity is commanded, God commands the blessing. Division is not just relationally painful — it is strategically devastating. The enemy does not need to defeat you if he can divide you.',q:[
{t:'s',q:'How would you honestly describe the unity level of your current leadership team?'},
{t:'m',q:'Psalm 133 compares unity to precious oil poured on the head that ran down onto whose beard?',o:['David\'s','Solomon\'s','Aaron\'s','Moses\'']},
{t:'s',q:'Where is division most likely to enter your team? What are you doing to guard against it?'},
{t:'s',q:'What is the difference between unity and uniformity? How do you cultivate one without demanding the other?'},
{t:'s',q:'What is one specific thing you will do this week to strengthen unity in your team?'}
]},
{day:54,stage:4,title:'Prophetic leadership',ref:'Amos 3:7',dev:'Surely the Sovereign Lord does nothing without revealing His plan to His servants the prophets. A leader who is connected to God should be a leader who carries prophetic insight — not just strategic planning but Spirit-revealed direction. The Church needs leaders who can hear what God is saying to this generation.',q:[
{t:'s',q:'How prophetically connected is your leadership? How often does what you sense from God about the future turn out to be accurate?'},
{t:'m',q:'Amos 3:7 says the Sovereign Lord does nothing without revealing His plan to whom?',o:['All believers','His servants the prophets','Church leaders only','Those who fast']},
{t:'s',q:'Describe a time when you had a clear prophetic sense about a direction for ministry. What happened when you followed it or did not follow it?'},
{t:'s',q:'How do you cultivate prophetic sensitivity as a leader without becoming presumptuous or irresponsible?'},
{t:'s',q:'What do you sense God saying prophetically about SIM\'s next season? Write it out — even if it is still developing.'}
]},
{day:55,stage:4,title:'Finishing well',ref:'2 Timothy 4:6-8',dev:'I have fought the good fight, I have finished the race, I have kept the faith. Paul wrote that from prison, facing execution. Three declarations — past tense, complete. Not "I am fighting" or "I hope to finish." Done. The crown was not for starting well. It was for finishing. Many leaders start well. Fewer finish well.',q:[
{t:'s',q:'What does finishing well look like to you in this specific season of your leadership?'},
{t:'m',q:'Paul says there is in store for him a crown of what, which the Lord will award him on that day?',o:['Gold','Glory','Righteousness','Life']},
{t:'s',q:'What are the greatest threats to you finishing well in ministry? Be completely honest.'},
{t:'s',q:'Name a leader who finished well. What specific qualities did they have that enabled them to finish the way they did?'},
{t:'s',q:'Write a "finish well" covenant — a personal commitment to the non-negotiables that will keep you on track for the long haul of ministry.'}
]},
{day:56,stage:4,title:'Apostolic culture',ref:'Acts 2:42-47',dev:'The early church devoted themselves to the apostles\' teaching, to fellowship, to breaking of bread, and to prayer. And the Lord added to their number daily. The culture came first. The growth was the result. Apostolic culture is not a style of worship — it is a way of life together.',q:[
{t:'s',q:'How would you describe the apostolic culture of SIM? What makes it distinct?'},
{t:'m',q:'Acts 2:47 says the Lord added to their number daily those who were being what?',o:['Baptized','Discipled','Saved','Called']},
{t:'s',q:'Of the four devotions in Acts 2:42 — teaching, fellowship, breaking of bread, prayer — which is strongest in your team? Which needs the most development?'},
{t:'s',q:'What is your personal responsibility in maintaining and strengthening the apostolic culture of your ministry?'},
{t:'s',q:'What would a new person who joined your ministry team immediately notice about the culture? Would what they notice reflect the Acts 2 standard?'}
]},
{day:57,stage:4,title:'The leader\'s prayer life — advanced',ref:'Luke 18:1-8',dev:'Jesus told the parable of the persistent widow to show that they should always pray and not give up. The widow was not gifted — she was persistent. She had no power except her persistence. That was enough. A leader\'s prayer life at this level is not devotional — it is governmental.',q:[
{t:'s',q:'How has your prayer life changed between the beginning of the 30-day program and where you are now?'},
{t:'m',q:'Jesus told the parable of the persistent widow to teach that we should always pray and not do what?',o:['Doubt','Give up','Sin','Be distracted']},
{t:'s',q:'What does governmental intercession mean to you? How does it differ from personal petition?'},
{t:'s',q:'What specific things are you currently pressing God in prayer about that have not yet broken through? How long have you been contending?'},
{t:'s',q:'Write a governmental intercession for SIM — not for your personal needs but for the mission, the people, the city and the nation you are called to.'}
]},
{day:58,stage:4,title:'When leadership is lonely',ref:'1 Kings 19:1-4',dev:'Elijah sat down under a juniper tree and said "I have had enough Lord. Take my life." The greatest prophet in Israel\'s history — after one of the greatest miracles in scripture — collapsed in suicidal exhaustion. Leadership loneliness is real. And God\'s response to Elijah was not a sermon. It was food, water and rest.',q:[
{t:'s',q:'How lonely does your leadership feel right now on a scale of 1-10? What is driving that number?'},
{t:'m',q:'After Elijah fled and sat under the juniper tree, what did the angel do first when he touched him?',o:['Gave him a vision','Told him to get up and pray','Said "Arise and eat"','Showed him the future']},
{t:'s',q:'Have you ever hit a wall in leadership like Elijah did — spiritually, emotionally, physically exhausted? Describe what that felt like.'},
{t:'s',q:'What does God\'s response to Elijah teach you about how to care for yourself and for others in leadership exhaustion?'},
{t:'s',q:'Who knows when you are struggling in leadership? Who is close enough to notice and respond? If no one — what will you do about that?'}
]},
{day:59,stage:4,title:'The mantle you carry',ref:'2 Kings 2:13-14',dev:'Elisha picked up the mantle of Elijah that had fallen. He struck the water and said "Where is the Lord, the God of Elijah?" and the water parted. The mantle was not magic — it was a transfer of anointing through relationship and covenant. What you carry has been placed on you intentionally.',q:[
{t:'s',q:'What is the spiritual mantle you believe God has placed on your life? Describe it with as much clarity as you can.'},
{t:'m',q:'After Elisha struck the water with Elijah\'s mantle, what happened?',o:['Nothing at first','The water parted for him','Fire came down','The Spirit fell on him']},
{t:'s',q:'From whom did you receive spiritual impartation and covering? What did they carry that has been transferred to you?'},
{t:'s',q:'What responsibility comes with the mantle you carry? What would it mean to dishonor it?'},
{t:'s',q:'Who are you currently transferring mantle to? How intentional are you about that process?'}
]},
{day:60,stage:4,title:'The covenant of completion',ref:'Philippians 1:6',dev:'He who began a good work in you will carry it on to completion until the day of Christ Jesus. God does not start things He does not intend to finish. You are not a project He abandoned — you are a work He is completing. And the fact that you made it to Day 60 is evidence of that.',q:[
{t:'s',q:'You made it to Day 60. What has God completed in you over these 60 days that was not in you when you started?'},
{t:'m',q:'Philippians 1:6 says God who began a good work in you will carry it to completion until when?',o:['You are ready','The day of Christ Jesus','You complete your assignment','The end of this program']},
{t:'s',q:'What is the single most important thing you are carrying out of this 60-day program into your leadership?'},
{t:'s',q:'What commitments are you making to yourself, to God and to those you lead as a result of this journey?'},
{t:'s',q:'Write a commissioning prayer over yourself — speak to who you are, what you carry, where you are going, and what you are declaring over your leadership from this day forward. Make it bold.'}
]}
];

let user=null,subs={},curDay=1,stageFilt=0,mcSel={};
const sn={1:'Deepening your foundation',2:'Character under pressure',3:'Leading yourself',4:'Covenant leadership in action'};
const sb={1:'s1',2:'s2',3:'s3',4:'s4'};

function toggleCode(){
  const f=document.getElementById('enroll-code-field');
  f.style.display=f.style.display==='block'?'none':'block';
}
function saveLocal(){
  if(!user)return;
  const k='siu_core60_'+user.email.replace(/[^a-z0-9]/gi,'_');
  localStorage.setItem(k,JSON.stringify({user,subs,curDay}));
}
function loadLocal(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('siu_core60_'));
  if(!keys.length)return false;
  const d=JSON.parse(localStorage.getItem(keys[keys.length-1]));
  if(!d||!d.user)return false;
  user=d.user;subs=d.subs||{};curDay=d.curDay||1;mcSel={};return true;
}
function doLogin(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const role=document.getElementById('inp-role').value;
  const code=document.getElementById('inp-code').value.trim();
  const err=document.getElementById('login-err');
  if(!name||!email||!role){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!email.includes('@')){err.textContent='Please enter a valid email address.';err.style.display='block';return;}
  if(code&&code.toUpperCase()!==ADMIN_CODE){err.textContent='Invalid enrollment code.';err.style.display='block';return;}
  err.style.display='none';
  user={name,email,role,code:code||'self-enrolled'};
  saveLocal();initApp();
}
function doLogout(){
  if(!confirm('Sign out? Your progress is saved.'))return;
  user=null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
}
function initApp(){
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  const ini=user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('hdr-avatar').textContent=ini;
  document.getElementById('hdr-name').textContent=user.name.split(' ')[0];
  updateProgress();renderGrid();renderStudy(curDay);
}
function switchTab(t){
  document.getElementById('tab-study').style.display=t==='study'?'block':'none';
  document.getElementById('tab-report').style.display=t==='report'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='study'&&i===0)||(t==='report'&&i===1)));
  if(t==='report')renderReport();
}
function setStage(s,el){
  stageFilt=s;
  document.querySelectorAll('.stage-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');renderGrid();
}
function renderGrid(){
  const days=stageFilt===0?DAYS:DAYS.filter(d=>d.stage===stageFilt);
  document.getElementById('day-grid').innerHTML=days.map(d=>{
    const done=subs[d.day]?.submitted;
    const act=d.day===curDay&&!done;
    return '<div class="day-dot'+(done?' done':'')+(act?' active':'')+'" onclick="selectDay('+d.day+')"><span>Day</span><span>'+d.day+'</span></div>';
  }).join('');
}
function selectDay(n){
  curDay=n;if(!mcSel[n])mcSel[n]={};saveLocal();renderGrid();renderStudy(n);
  document.getElementById('study-content').scrollIntoView({behavior:'smooth',block:'start'});
}
function renderStudy(n){
  const d=DAYS.find(x=>x.day===n);if(!d)return;
  const done=subs[n]?.submitted;
  const saved=subs[n]?.answers||{};
  const qHtml=d.q.map((q,i)=>{
    const sv=saved[i]||'';
    if(q.t==='m'){
      const opts=q.o.map(o=>{
        const sel=done?sv===o:(mcSel[n]?.[i]===o);
        return '<div class="mc-item'+(sel?' sel':'')+(done?' readonly':'')+'" onclick="'+(done?'':'handleMC('+n+','+i+',this)')+'"><div class="mc-radio"><div class="mc-radio-dot"></div></div>'+o+'</div>';
      }).join('');
      return '<div class="q-block"><div class="q-label">Question '+(i+1)+' · Multiple choice</div><div class="q-text">'+q.q+'</div><div class="mc-list">'+opts+'</div></div>';
    }
    return '<div class="q-block"><div class="q-label">Question '+(i+1)+' · Short answer</div><div class="q-text">'+q.q+'</div><textarea class="ans-input" id="ans_'+n+'_'+i+'" '+(done?'readonly':'')+'>'+(sv)+'</textarea></div>';
  }).join('');
  const prev=n>1?'<button class="nav-btn" onclick="selectDay('+(n-1)+')">← Day '+(n-1)+'</button>':'';
  const next=n<60?'<button class="nav-btn" onclick="selectDay('+(n+1)+')">Day '+(n+1)+' →</button>':'';
  document.getElementById('study-content').innerHTML='<div class="study-card"><span class="stage-badge '+sb[d.stage]+'">Stage '+d.stage+' · '+sn[d.stage]+'</span><div class="day-num">Day '+d.day+' of 60</div><div class="day-title">'+d.title+'</div><div class="ref-block"><span class="ref-text">'+d.ref+' · The Message</span><a class="bg-btn" href="'+BG_BASE+encodeURIComponent(d.ref)+BG_VER+'" target="_blank">Read on Bible Gateway</a></div><div class="devotional">'+d.dev+'</div>'+qHtml+(done?'<div class="done-banner"><strong>Day '+n+' complete ✓</strong>Submitted '+subs[n].time+'<br><span style="font-size:12px;opacity:.75">Apostle Everett can see your responses in the live dashboard.</span></div>':'<button class="submit-btn" id="sbtn-'+n+'" onclick="submitDay('+n+')">Submit Day '+n+'</button>')+'<div id="toast-'+n+'" class="toast"></div><div class="nav-row">'+prev+next+'</div></div>';
}
function handleMC(dayN,qi,el){
  if(!mcSel[dayN])mcSel[dayN]={};
  const val=el.innerText.trim();
  mcSel[dayN][qi]=val;
  el.closest('.mc-list').querySelectorAll('.mc-item').forEach(item=>item.classList.remove('sel'));
  el.classList.add('sel');
}
function showToast(n,msg,type){
  const t=document.getElementById('toast-'+n);
  if(!t)return;t.className='toast '+type;t.textContent=msg;
}
async function submitDay(n){
  const d=DAYS.find(x=>x.day===n);
  const answers={};let missing=false;
  d.q.forEach((q,i)=>{
    if(q.t==='s'){const el=document.getElementById('ans_'+n+'_'+i);if(!el||el.value.trim()===''){missing=true;return;}answers[i]=el.value.trim();}
    else{const sv=mcSel[n]?.[i];if(!sv){missing=true;return;}answers[i]=sv;}
  });
  if(missing){showToast(n,'Please answer all 5 questions before submitting.','err');return;}
  const btn=document.getElementById('sbtn-'+n);
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  showToast(n,'Saving your responses...','saving');
  const ts=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  const payload={name:user.name,email:user.email,role:user.role,stage:d.stage,day:d.day,dayTitle:d.title,ref:d.ref,track:'Core Leadership 60-Day',q1:d.q[0].q,a1:answers[0]||'',q2:d.q[1].q,a2:answers[1]||'',q3:d.q[2].q,a3:answers[2]||'',q4:d.q[3].q,a4:answers[3]||'',q5:d.q[4].q,a5:answers[4]||''};
  try{
    if(APPS_SCRIPT_URL&&APPS_SCRIPT_URL!=='YOUR_APPS_SCRIPT_WEB_APP_URL_HERE'){
      await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    }
  }catch(err){console.warn('Sheet sync:',err);}
  subs[n]={answers,submitted:true,time:ts};saveLocal();updateProgress();renderGrid();renderStudy(n);
}
function updateProgress(){
  const done=Object.values(subs).filter(s=>s.submitted).length;
  const pct=Math.round(done/60*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Day '+done+' of 60 complete';
}
function testConnection(){
  const box=document.getElementById('conn-status');
  box.style.display='block';box.style.background='var(--warn-bg)';box.style.color='var(--warn)';box.textContent='Testing connection...';
  fetch(APPS_SCRIPT_URL,{method:'GET',mode:'no-cors'})
    .then(()=>{box.style.background='var(--success-bg)';box.style.color='var(--success)';box.textContent='Connection successful — submissions will flow to Apostle Everett\'s sheet automatically.';})
    .catch(err=>{box.style.background='var(--danger-bg)';box.style.color='var(--danger)';box.textContent='Connection failed: '+err.message;});
}
function renderReport(){
  const done=Object.values(subs).filter(s=>s.submitted).length;
  const sc=[0,0,0,0,0];const st=[0,15,15,15,15];
  DAYS.forEach(d=>{if(subs[d.day]?.submitted)sc[d.stage]++;});
  document.getElementById('metrics-grid').innerHTML='<div class="metric-card"><div class="metric-val">'+done+'</div><div class="metric-lbl">Days completed</div></div><div class="metric-card"><div class="metric-val">'+(60-done)+'</div><div class="metric-lbl">Days remaining</div></div><div class="metric-card"><div class="metric-val">'+Math.round(done/60*100)+'%</div><div class="metric-lbl">Progress</div></div><div class="metric-card"><div class="metric-val">'+(done*5)+'</div><div class="metric-lbl">Responses logged</div></div>';
  const sl=['','Stage 1 · Deepening foundation','Stage 2 · Character under pressure','Stage 3 · Leading yourself','Stage 4 · Covenant leadership'];
  document.getElementById('stage-progress').innerHTML=[1,2,3,4].map(s=>'<div class="stage-row"><div class="stage-labels"><span>'+sl[s]+'</span><span class="stage-pct">'+sc[s]+'/'+st[s]+'</span></div><div class="prog-track"><div class="prog-inner" style="width:'+Math.round(sc[s]/st[s]*100)+'%"></div></div></div>').join('');
  const entries=Object.entries(subs).filter(([,v])=>v.submitted).sort((a,b)=>+a[0]-+b[0]);
  if(!entries.length){document.getElementById('sub-list').innerHTML='<div class="empty-state">No submissions yet. Complete your first day to see your responses here.</div>';return;}
  document.getElementById('sub-list').innerHTML=entries.map(([dn,sub])=>{
    const d=DAYS.find(x=>x.day===+dn);
    const prev=sub.answers[0]?sub.answers[0].substring(0,80)+'...':'[Multiple choice]';
    const ansHtml=d.q.map((q,i)=>'<div class="ans-q"><span class="ans-q-label">Q'+(i+1)+': '+q.q+'</span><span class="ans-q-text">'+(sub.answers[i]||'—')+'</span></div>').join('');
    return '<div class="sub-item"><div class="sub-header"><div><div class="sub-name">Day '+dn+' — '+d.title+'</div></div><span class="sub-badge">Done ✓</span></div><div class="sub-time">'+sub.time+'</div><div class="sub-preview">'+prev+'</div><button class="expand-btn" onclick="toggleDetail(this,\'det-'+dn+'\')">View all 5 responses ↓</button><div class="ans-detail" id="det-'+dn+'">'+ansHtml+'</div></div>';
  }).join('');
}
function toggleDetail(btn,id){const el=document.getElementById(id);if(!el)return;const open=el.style.display==='block';el.style.display=open?'none':'block';btn.textContent=open?'View all 5 responses ↓':'Hide responses ↑';}
if(loadLocal()){initApp();}else{document.getElementById('screen-login').classList.add('active');}
</script>
</body>
</html>
